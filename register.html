<!DOCTYPE html>
<html>
<head>

    <title>Register</title>

    <link rel="stylesheet"
          href="/static/style.css">

</head>

<body>

<div class="container">

    <h2>Register</h2>

    <input type="text"
           id="username"
           placeholder="Enter Username">

    <input type="email"
           id="regEmail"
           placeholder="Enter Email">

    <input type="password"
           id="regPassword"
           placeholder="Enter Password">

    <button class="register-btn"
            onclick="register()">
        Register
    </button>

</div>

<script src="/static/script.js"></script>

</body>
</html>
